name: CI/CD Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Tự động chạy khi bạn push code lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code từ GitHub về máy ảo của GitHub Actions
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài đặt môi trường Java để build file .jar
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 3. Build dự án Maven (tạo ra file trong thư mục target)
      - name: Build with Maven
        run: mvn clean package -DskipTests



      # 4. Đăng nhập vào Docker Hub sử dụng Secrets đã lưu ở Bước 2
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build Image từ Dockerfile và Push lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # format: <tên_user_dockerhub>/<tên_repo_dockerhub>
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/java-api-app:latest
            ${{ secrets.DOCKER_USERNAME }}/java-api-app:${{ github.sha }}