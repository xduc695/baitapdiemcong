name: CI/CD Deploy Professional

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Cài đặt Java JDK 21 để build file .jar
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 2. Build file .jar bằng Maven (bỏ qua test để build nhanh hơn)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 3. Đăng nhập vào Github Container Registry (GHCR) để lách luật khóa tải của Docker Hub
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Github tự cấp sẵn 100%, bạn KHÔNG cần tạo secret bằng tay

      # 4. Build và Push Docker Image lên Github
      - name: Build and Push Docker image
        run: |
          GITHUB_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="ghcr.io/$GITHUB_REPO_LOWER:latest"
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      # 5. Profile & Deploy to DevOps Classroom
      - name: Profile & Deploy to DevOps Classroom
        run: |
          # Định nghĩa màu sắc
          CYAN='\033[0;36m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'

          # 1. In Banner Profile
          echo -e "${CYAN}======================================================${NC}"
          echo -e "${YELLOW}          BACKEND DEVELOPER - DEPLOYMENT PIPELINE      ${NC}"
          echo -e "${CYAN}======================================================${NC}"
          echo -e "${GREEN}  FullName :${NC} NGUYEN XUAN DUC"
          echo -e "${GREEN}  Project   :${NC} Java API Application (GHCR Bypass)"
          echo -e "${CYAN}------------------------------------------------------${NC}"

          # 2. Cấu hình biến ép máy chủ Pull từ Github thay vì Docker Hub
          GITHUB_REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/$GITHUB_REPO_LOWER"
          CONTAINER_PORT=8080 # Đã cập nhật theo Spring Boot của bạn
          SLOT=8

          echo -e "${YELLOW}[INFO]${NC} Deploying image: ${BLUE}$REPO:latest${NC} to ${BLUE}Slot $SLOT${NC}..."

          # 3. Gọi Webhook Deploy
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=$SLOT&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo -e "${YELLOW}[INFO]${NC} Webhook returned HTTP Status: ${CYAN}$CODE${NC}"

          # 4. Xử lý logic kết quả
          if [ "$CODE" -eq 524 ]; then
            echo -e "${YELLOW}⚠️  WARNING:${NC} Server Cloudflare Timeout (524)."
            echo -e "Quá trình Pull Image vẫn đang diễn ra ngầm trên Server."
            echo "::group::Chi tiết webhook JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            echo -e "${GREEN}>>> Vui lòng kiểm tra Dashboard DevOps Classroom sau vài phút!${NC}"
            exit 0
          elif [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo -e "${RED}❌ DEPLOY FAILED!${NC}"
            echo "::group::Xem chi tiết lỗi JSON"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo -e "${GREEN}✅ DEPLOY SUCCESSFUL!${NC}"
          echo -e "${CYAN}======================================================${NC}"
          echo "::group::Chi tiết phản hồi từ Server"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"